[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=7.0.0",
    "pytest-xdist>=3.0.0",
    "ty>=0.0.0a6",
    "ruff>=0.1.0",
    "codespell>=2.2.0",
]

[tool.uv]
workspace = { members = ["orbit-*", "nats-extra"] }

[tool.ruff]
line-length = 120
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B006"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["nats", "orbit"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
addopts = ["--import-mode=importlib"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["*/tests"]

[tool.codespell]
skip = ".git,*.lock,*.svg,*.png,*.jpg,*.jpeg,*.gif,*.ico,*.woff,*.woff2,*.ttf,*.eot,.venv,.venv-*,.mypy_cache,htmlcov,*.pyc"
ignore-words-list = "nats,nuid,ack,nak,hdr"
check-filenames = true
check-hidden = true
